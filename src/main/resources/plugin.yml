name: Main
description: $description
prefix: Main
version: '${version}'

main: pl.cramber.hardcorelives.Main
api-version: '1.21'
load: POSTWORLD
folia-supported: true

authors: [ Cramber ]
website: https://github.com/Cramber25/HardcoreLives

softdepend:
  - PlaceholderAPI

commands:
  lives:
    description: Check the remaining lives of a player.
    usage: /lives [player] | /lives <set|add> <player> <amount>
permissions:
  hardcorelives.admin:
    description: Change the remaining lives of a player.
    default: op